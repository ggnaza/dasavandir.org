name: Build Agent

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      task_gid:
        description: "Process a specific Asana task GID (skips polling)"
        required: false

jobs:
  poll:
    name: Poll Asana for ai-build tasks
    runs-on: ubuntu-latest
    outputs:
      tasks: ${{ steps.poll.outputs.tasks }}
      task_count: ${{ steps.poll.outputs.task_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Poll Asana
        id: poll
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          SPECIFIC_TASK_GID: ${{ inputs.task_gid }}
        run: |
          if [ -n "$SPECIFIC_TASK_GID" ]; then
            TASK=$(curl -s \
              -H "Authorization: Bearer $ASANA_ACCESS_TOKEN" \
              "https://app.asana.com/api/1.0/tasks/${SPECIFIC_TASK_GID}?opt_fields=gid,name,notes,custom_fields")
            TASKS=$(echo "$TASK" | node -e "
              const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              process.stdout.write(JSON.stringify([d.data]));
            ")
            echo "tasks=$TASKS" >> $GITHUB_OUTPUT
            echo "task_count=1" >> $GITHUB_OUTPUT
          else
            node .github/scripts/asana-poll.js
          fi

  build:
    name: Build Asana task
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.task_count != '0' && needs.poll.outputs.tasks != '[]' && needs.poll.outputs.tasks != ''
    timeout-minutes: 30
    strategy:
      matrix:
        task: ${{ fromJson(needs.poll.outputs.tasks) }}
      max-parallel: 1

    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "Dasavandir Build Agent"
          git config user.email "agent@dasavandir.org"

      - name: Create feature branch
        id: branch
        env:
          TASK_GID: ${{ matrix.task.gid }}
        run: |
          BRANCH="feature/asana-${TASK_GID}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "task_gid=$TASK_GID" >> $GITHUB_OUTPUT

      - name: Clear Build field so task won't re-trigger
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          TASK_GID: ${{ matrix.task.gid }}
        run: node .github/scripts/asana-update.js clear-build "$TASK_GID"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write Claude prompt to file
        env:
          TASK_NAME: ${{ matrix.task.name }}
          TASK_NOTES: ${{ matrix.task.notes }}
        run: |
          node -e "
            const fs = require('fs');
            const lines = [
              'You are working on the Dasavandir LMS — a Next.js 14 app with Supabase, Tailwind, and TypeScript.',
              '',
              'Implement the Asana task below. Follow existing code patterns closely.',
              '',
              'Rules:',
              '- Only edit/create source files — do NOT run git commands or create PRs',
              '- Do NOT add comments explaining what you changed',
              '- Do NOT add features beyond what is described',
              '- After making changes, stop',
              '',
              'Task: ' + process.env.TASK_NAME,
              '',
              'Description:',
              process.env.TASK_NOTES || '(no description provided)'
            ];
            fs.writeFileSync('/tmp/claude-prompt.txt', lines.join('\n'));
          "

      - name: Run Claude Code to implement task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/claude-prompt.txt)"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          TASK_NAME: ${{ matrix.task.name }}
          TASK_GID: ${{ steps.branch.outputs.task_gid }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          node -e "
            const fs = require('fs');
            const msg = [
              'feat(agent): ' + process.env.TASK_NAME,
              '',
              'Implements Asana task ' + process.env.TASK_GID,
              '',
              'Co-Authored-By: Dasavandir Build Agent <agent@dasavandir.org>'
            ].join('\n');
            fs.writeFileSync('/tmp/commit-msg.txt', msg);
          "
          git add -A
          git commit -F /tmp/commit-msg.txt
          git push origin "$BRANCH"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TASK_NAME: ${{ matrix.task.name }}
          TASK_NOTES: ${{ matrix.task.notes }}
          TASK_GID: ${{ steps.branch.outputs.task_gid }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          node -e "
            const fs = require('fs');
            const body = [
              '## Asana task',
              '[' + process.env.TASK_NAME + '](https://app.asana.com/0/0/' + process.env.TASK_GID + '/f)',
              '',
              '## Description',
              process.env.TASK_NOTES || '(no description)',
              '',
              '---',
              'Implemented by the Dasavandir Build Agent',
              '<!-- asana-task-gid: ' + process.env.TASK_GID + ' -->'
            ].join('\n');
            fs.writeFileSync('/tmp/pr-body.txt', body);
          "
          PR_URL=$(gh pr create \
            --base staging \
            --head "$BRANCH" \
            --title "$TASK_NAME" \
            --body-file /tmp/pr-body.txt)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment PR link on Asana task
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          TASK_GID: ${{ steps.branch.outputs.task_gid }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          node .github/scripts/asana-update.js comment "$TASK_GID" "Build agent created PR: $PR_URL"

      - name: Comment on Asana if no changes produced
        if: steps.changes.outputs.has_changes == 'false'
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          TASK_GID: ${{ steps.branch.outputs.task_gid }}
        run: |
          node .github/scripts/asana-update.js comment "$TASK_GID" "Build agent ran but made no file changes. Add more detail and set Build = ai-build again to retry."
